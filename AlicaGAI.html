<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlicaGAI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:1px solid #1e293b;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:70%;
padding:12px 16px;
border-radius:12px;
line-height:1.4;
animation:fadeIn .3s ease;
}

.user{
align-self:flex-end;
background:#2563eb;
}

.ai{
align-self:flex-start;
background:#374151;
}

.typing{
align-self:flex-start;
background:#374151;
opacity:0.7;
font-style:italic;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(5px);}
to{opacity:1; transform:translateY(0);}
}

#inputArea{
display:flex;
padding:15px;
background:#020617;
border-top:1px solid #1e293b;
}

#messageInput{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:8px;
background:#1e293b;
color:white;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1d4ed8;
transform:scale(1.05);
}

</style>
</head>

<body>

<header>AlicaGAI</header>

<div id="chat"></div>

<div id="inputArea">
<input id="messageInput" placeholder="Напишите сообщение..." />
<button onclick="sendMessage()">Отправить</button>
</div>

<script>

const API_KEY = "sk-1738c497b48d47a89886db872369e050";

const chat = document.getElementById("chat");
const input = document.getElementById("messageInput");

let messages = [
{
role:"system",
content:"Ты Алиса. Твое название нейросети AlicaGAI. Помогай всем."
}
];

function addMessage(text, className){

const msg = document.createElement("div");
msg.className = "message " + className;
msg.textContent = text;

chat.appendChild(msg);
chat.scrollTop = chat.scrollHeight;

return msg;
}

async function sendMessage(){

const text = input.value.trim();
if(!text) return;

addMessage(text,"user");

messages.push({
role:"user",
content:text
});

input.value="";

const typing = addMessage("AlicaGAI печатает...","typing");

try{

fetch("https://api.deepseek.com/v1/chat/completions", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + API_KEY
  },
  body: JSON.stringify({
    model: "deepseek-chat",
    messages: [
      { role: "user", content: "Привет" }
    ]
  })
})

const data = await response.json();

typing.remove();

const reply = data.choices[0].message.content;

addMessage(reply,"ai");

messages.push({
role:"assistant",
content:reply
});

}catch(err){

typing.remove();

addMessage("Ошибка подключения к API","ai");

console.error(err);

}

}

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
sendMessage();
}
});

</script>

</body>
</html>
